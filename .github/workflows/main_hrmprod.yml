name: Deploy Python app to Azure (direct)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: hrmprod-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Optional: cache pip wheel files to speed repeated Oryx builds (small speed up)
      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Optional: basic lint/test step — keep lightweight
      - name: Run lightweight checks (optional)
        run: |
          python -V
          # add quick static checks here (avoid heavy test suites to keep job fast)

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hrmprod'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_99A26A22CC0645188959D625CD2EA0F3 }}
          # package: '.'   # optional; when omitted the action zips repo by default
