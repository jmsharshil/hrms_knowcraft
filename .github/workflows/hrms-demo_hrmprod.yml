name: Build and deploy Python app to Azure Web App - hrmprod

on:
  push:
    branches:
      - hrms-demo
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install Linux system dependencies required for pycairo
      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            libcairo2-dev \
            pkg-config \
            python3-dev \
            libgirepository1.0-dev

      # Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Azure Login
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5D7C50928C3D4C8E82D727383D216F7F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F23F8E15745B43F7A5BE9406CF2F1FF6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A77F2EE5BB034741A8E7024A2430C97B }}

      # Deploy directly to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: hrmprod
          slot-name: Production
          package: .
