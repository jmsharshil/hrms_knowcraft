name: Build and deploy Python app to Azure Web App - hrmsknowcraft

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Optional: build/test job, just to catch errors early
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create and start virtual environment and install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
      # ⛔️ NO upload-artifact step here anymore

  deploy:
    runs-on: ubuntu-latest
    needs: build          # keeps the build check; remove this line if you don't want that dependency
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1581420AD6724A04B8FCE8F47A2F7D0D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8A1EC4FE307A4E66931A14367A1015FD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_31D1FE71E23845B6B8C535F948112AEB }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hrmsknowcraft'
          slot-name: 'Production'
          package: .
